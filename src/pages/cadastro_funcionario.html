    <main class="pagina-form">
        <div class="form-card">

            <input type="text" placeholder="Sobrenome" class="form-input">
            <input type="text" placeholder="CPF" class="form-input">
            <input type="date" class="form-input">
            <input type="tel" placeholder="Telefone" class="form-input">
            <input type="tel" placeholder="Cargo / Função" class="form-input">
            <input type="email" placeholder="Email" class="form-input">
            <input type="password" placeholder="Senha" class="form-input">

            <label class="form-label-foto">Selecionar foto de perfil:</label>
            <div class="file-input-wrapper">
                <label class="btn-escolher">Escolher arquivo</label>
                <input type="file" id="foto-perfil" hidden>
                <span class="file-nome">Nenhum arquivo escolhido</span>
            </div>

            <button class="btn btn-cadastrar">CADASTRAR</button>
