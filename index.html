<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    Shopee Brasil | Na Shopee Compensa Mais | Frete Grátis e Cupom!
  </title>
  <link rel="stylesheet" href="src/css/global.css" />
  <link rel="stylesheet" href="src/css/header.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
</head>

<body>
  <!-- HEADER -->
  <header class="header">
    <!-- TOP BAR --> <!-- tem que centralizar essa merda, mó preg-->

      <div class="container">
        <nav class="top-nav">
          <ul>
            <li><a href="#">Central do Vendedor </a></li>
            <li><a href="#">Ajuda</a></li>
            <li><a href="#">Vender</a></li>
            <li><a href="#">Baixar App</a></li>
          </ul>
        </nav>

        <div class="top-actions">
          <a href="#">Login</a>
          <a href="#">Cadastrar</a>
        </div>
      </div>
    </div>

    <!-- MAIN HEADER -->
    <div class="main-header">
      <div class="container">
        <!-- LOGO -->
        <div class="logo">
          <h1>Zoopii</h1>
        </div>

        <!-- SEARCH -->
        <div class="search-bar">
          <form>
            <input type="text" placeholder="Buscar produtos..." />
            <button type="submit">🔍</button>
          </form>

          <!-- SUGESTÕES -->
          <div class="search-suggestions">
            <!-- sla, to na preg de fzer isso -->
          </div>
        </div>

        <!-- ACTIONS --> <!-- tem que centralizar essa merda, mó preg-->
        <div class="header-actions">
          <a href="src/pages/carrinho.html"> <button class="cart-btn">🛒</button></a>
          <button class="user-btn">👤</button>
        </div>
      </div>
    </div>

    <!-- MENU --> <!-- esta feio pra krlh isso aqui, arruma for me pls-->
    <nav class="menu">
      <div class="container">
        <ul>
          <li><a href="#">Eletrônicos</a></li>
          <li><a href="#">Moda</a></li>
          <li><a href="#">Casa</a></li>
          <li><a href="#">Beleza</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- MAIN -->
  <main>
    <!-- BANNER --> <!-- tem que centralizar essa merda, mó preg-->
    <section class="banner">
      <div class="container">
        <div class="banner-main">
          <img src="assets/banner.jpg" alt="Banner principal" />
        </div>

        <div class="banner-side">
          <img src="assets/banner2.jpg" alt="" />
          <img src="assets/banner3.jpg" alt="" />
        </div>
      </div>
    </section>

    <!-- CATEGORIAS -->
    <section class="categorias">
      <div class="container">
        <h2>Categorias</h2>

        <div class="grid-categorias">
          <a href="#" class="categoria">
            <img src="assets/cat1.png" alt="" />
            <span>Eletrônicos</span>
          </a>

          <a href="#" class="categoria">
            <img src="assets/cat2.png" alt="" />
            <span>Moda</span>
          </a>
        </div>
      </div>
    </section>

    <!-- PRODUTOS -->
    <section class="produtos">
      <div class="container">
        <h2>Produtos</h2>

        <div class="grid-produtos" id="lista-produtos">
          <!-- Produtos aqui  -->
        </div>
      </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-links">
        <h3>Institucional</h3>
        <ul>
          <li><a href="#">Sobre nós</a></li>
          <li><a href="#">Carreiras</a></li>
        </ul>
      </div>

      <div class="footer-links">
        <h3>Ajuda</h3>
        <ul>
          <li><a href="#">Suporte</a></li>
          <li><a href="#">Contato</a></li>
        </ul>
      </div>

      <div class="footer-copy">
        <p>© 2026 Zoopi</p>
      </div>
    </div>

  <!-- JS -->
  <script src="src/js/main.js"></script>
